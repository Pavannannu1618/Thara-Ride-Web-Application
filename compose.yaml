services:
  backend:
    image: backend
    build:
      context: backend
      dockerfile: ./Dockerfile
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
    depends_on:
      - redis
      - mongo

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=thararide

volumes:
  mongo_data:
  redis_data:
